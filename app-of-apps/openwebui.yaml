apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openwebui
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://github.com/Akatsuki-Ryu/gitops-test.git
    targetRevision: main
    path: manifests/openwebui          # raw manifests + tailscale TUN sidecar
  destination: {server: https://kubernetes.default.svc, namespace: openwebui}
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
