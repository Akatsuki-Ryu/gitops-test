apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openwebui
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://helm.openwebui.com/
    chart: open-webui
    targetRevision: "14.8.0"
    helm:
      releaseName: openwebui
      valuesObject:
        ollama: {enabled: false}        # no GPU; LLM via cloud API added in-UI
        pipelines: {enabled: false}
        websocket: {enabled: false}     # single replica, no redis needed
        tika: {enabled: false}
        persistence:
          enabled: true
          storageClass: upcloud-block-storage-hdd
          size: 5Gi
        ingress:
          enabled: true
          class: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-staging
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
          host: webui.81.27.99.77.nip.io
          tls: true
  destination: {server: https://kubernetes.default.svc, namespace: openwebui}
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
